<div id="notifModal" class="modal-overlay">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="notifTitle">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h3 id="notifTitle">Notificações</h3>
      <button id="closeNotif" class="close">Fechar ✕</button>
    </div>
    <div id="notifContent">
      <ul id="notifList" style="list-style:none;padding:0;margin:0;">
        <li style="padding:8px 0;border-bottom:1px solid #eee;color:#334155">Nenhuma notificação</li>
      </ul>
    </div>
  </div>
</div>
